<!doctype html>
<html lang="nn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Logg inn</title>
    <style>
      :root {
        --color-danger: #c33;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-danger: #f66;
        }
      }

      body {
        font-family: system-ui, sans-serif;
        max-width: 30rem;
        margin: 0 auto;
        padding: 3rem 1.5rem;
      }

      form {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        margin-top: 1rem;
      }

      .danger {
        color: var(--color-danger);
      }
    </style>
  </head>
  <body>
    <p>Skriv inn passord for å få tilgang:</p>
    <form id="login-form" method="post" action="/api/login">
      <input type="password" name="secret" autocomplete="off" />
      <button type="submit">Logg inn</button>
    </form>
    <p id="login-error" class="danger" hidden>Feil passord.</p>

    <script>
      if (location.search.includes("error=1")) {
        document.querySelector("#login-error").hidden = false;
      }
    </script>
  </body>
</html>
