<!doctype html>
<html lang="nn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ordbok-API-arbeidarprosessen</title>
    <style>
      :root {
        --color-danger: #c33;
        --color-muted: #999;
        --color-warning-bg: #fff3cd;
        --color-warning-border: #ffc107;
        --color-toast-bg: #333;
        --color-toast-fg: #fff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-danger: #f66;
          --color-muted: #888;
          --color-warning-bg: #3d2e00;
          --color-warning-border: #a67c00;
          --color-toast-bg: #ddd;
          --color-toast-fg: #111;
        }
      }

      body {
        font-family: system-ui, sans-serif;
        max-width: 80rem;
        margin: 0 auto;
        padding: 1.5rem;
      }

      td.num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .actions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .danger {
        color: var(--color-danger);
      }

      .outbox-stats {
        display: grid;
        grid-template-columns: auto auto;
        gap: 0.2rem 1rem;
        max-width: 20rem;
      }

      .toast {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        padding: 0.6rem 1rem;
        background: var(--color-toast-bg);
        color: var(--color-toast-fg);
        opacity: 0;
        transition: opacity 0.3s;
      }

      .toast.visible {
        opacity: 1;
      }

      .toast.error {
        background: var(--color-danger);
        color: var(--color-toast-fg);
      }

      .sync-controls {
        display: flex;
        gap: 0.8rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .warning {
        background: var(--color-warning-bg);
        border: 1px solid var(--color-warning-border);
        padding: 0.5rem 0.8rem;
      }

      .hidden {
        display: none;
      }

      .muted {
        color: var(--color-muted);
      }
    </style>
  </head>
  <body>
    <h1>Ordbok-API-arbeidarprosessen</h1>
    <div id="no-auth-warning" class="warning hidden">
      ⚠️ MGMT_UI_SECRET_HASH er ikkje sett. Alle har tilgang. Set
      miljøvariabelen for å krevja autentisering.
    </div>
    <div class="status" id="status">Lastar…</div>
    <div id="last-update" class="muted"></div>

    <div class="actions">
      <button id="btn-clear-queues" class="danger">Tøm køar</button>
      <button id="btn-clear-outbox" class="danger">Tøm utboks</button>
      <button id="btn-clear-all" class="danger">Tøm alt</button>
      <button id="btn-pause">⏸ Stopp automatisk oppdatering</button>
      <form method="post" action="/api/logout" style="margin: 0">
        <button type="submit">Logg ut</button>
      </form>
    </div>

    <h2>Synkronisering</h2>
    <div class="sync-controls">
      <label
        ><input type="checkbox" name="dict" value="bm" checked /> Bokmålsordboka
        (bm)</label
      >
      <label
        ><input type="checkbox" name="dict" value="nn" checked /> Nynorskordboka
        (nn)</label
      >
      <label
        ><input type="checkbox" name="dict" value="no" checked /> Norsk Ordbok
        (no)</label
      >
      <button id="btn-sync">Synkroniser</button>
    </div>

    <h2>Køar</h2>
    <table id="queue-table">
      <thead>
        <tr>
          <th>Kø</th>
          <th>På vent</th>
          <th>Planlagde</th>
          <th>Mislukka</th>
          <th>Daude</th>
          <th>Ferdige</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>Utboks</h2>
    <dl class="outbox-stats" id="outbox-stats"></dl>

    <h2>Aktive oppgåver</h2>
    <ul class="active-jobs" id="active-jobs"></ul>

    <div class="toast" id="toast"></div>

    <script type="module">
      const noAuthWarning = document.querySelector("#no-auth-warning");
      const statusElement = document.querySelector("#status");
      const lastUpdateElement = document.querySelector("#last-update");
      const queueBody = document.querySelector("#queue-table tbody");
      const outboxElement = document.querySelector("#outbox-stats");
      const activeElement = document.querySelector("#active-jobs");
      const toastElement = document.querySelector("#toast");

      let paused = false;
      let timer = null;
      const refreshInterval = 2000;

      {
        const res = await fetch("/api/auth-status");
        const { auth_required } = await res.json();

        if (!auth_required) {
          noAuthWarning.classList.remove("hidden");
        }
      }

      const escapeTemplate = document.createElement("template");

      function esc(str) {
        escapeTemplate.content.textContent = String(str);

        return escapeTemplate.innerHTML;
      }

      function showToast(msg, isError = false) {
        toastElement.textContent = msg;

        toastElement.classList.toggle("error", isError);
        toastElement.classList.add("visible");

        setTimeout(() => toastElement.classList.remove("visible"), 3000);
      }

      async function fetchStats() {
        try {
          const res = await fetch("/api/stats");

          if (res.status === 401) {
            location.href = "/login";
            return;
          }

          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }

          const data = await res.json();

          render(data);

          statusElement.textContent = "Tilkopla";
          statusElement.classList.remove("danger");

          lastUpdateElement.textContent = `Sist oppdatert: ${new Date().toLocaleTimeString()}`;
        } catch (e) {
          statusElement.textContent = `Feil: ${e.message}`;
          statusElement.classList.add("danger");
        }
      }

      function render({ queues, outbox, active_jobs }) {
        queueBody.innerHTML = queues
          .map(
            (q) => `<tr>
              <td>${esc(q.namespace.replace("apalis:", ""))}</td>
              <td class="num">${esc(q.pending)}</td>
              <td class="num">${esc(q.scheduled)}</td>
              <td class="num">${esc(q.failed)}</td>
              <td class="num">${esc(q.dead)}</td>
              <td class="num">${esc(q.done)}</td>
            </tr>`,
          )
          .join("");

        outboxElement.innerHTML = `
          <dt>På vent</dt><dd>${esc(outbox.pending)}</dd>
          <dt>Ferdige (1t)</dt><dd>${esc(outbox.processed_last_hour)}</dd>
          <dt>Total</dt><dd>${esc(outbox.total)}</dd>`;

        if (active_jobs.length === 0) {
          activeElement.innerHTML = '<li class="muted">Ingen</li>';
        } else {
          activeElement.innerHTML = active_jobs
            .map((j) => `<li>${esc(j)}</li>`)
            .join("");
        }
      }

      async function doAction(url, btn) {
        if (!confirm("Er du sikker?")) {
          return;
        }

        btn.disabled = true;

        try {
          const res = await fetch(url, { method: "POST" });
          const data = await res.json();

          showToast(data.message, !data.ok);

          if (!paused) {
            fetchStats();
          }
        } catch (e) {
          showToast(`Feil: ${e.message}`, true);
        } finally {
          btn.disabled = false;
        }
      }

      document
        .querySelector("#btn-clear-queues")
        .addEventListener("click", (e) =>
          doAction("/api/clear-queues", e.currentTarget),
        );
      document
        .querySelector("#btn-clear-outbox")
        .addEventListener("click", (e) =>
          doAction("/api/clear-outbox", e.currentTarget),
        );
      document
        .querySelector("#btn-clear-all")
        .addEventListener("click", (e) =>
          doAction("/api/clear-all", e.currentTarget),
        );

      document
        .querySelector("#btn-sync")
        .addEventListener("click", async (e) => {
          const btn = e.currentTarget;
          const checked = [
            ...document.querySelectorAll('input[name="dict"]:checked'),
          ].map((el) => el.value);

          if (checked.length === 0) {
            showToast("Vel minst éi ordbok.", true);
            return;
          }

          if (!confirm(`Synkronisere ${checked.join(", ")}?`)) {
            return;
          }

          btn.disabled = true;

          try {
            const res = await fetch("/api/sync", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ dictionaries: checked }),
            });
            const data = await res.json();

            showToast(data.message, !data.ok);

            if (!paused) {
              fetchStats();
            }
          } catch (err) {
            showToast(`Feil: ${err.message}`, true);
          } finally {
            btn.disabled = false;
          }
        });

      document.querySelector("#btn-pause").addEventListener("click", (e) => {
        paused = !paused;
        e.currentTarget.textContent = paused
          ? "▶ Oppdater automatisk"
          : "⏸ Stopp automatisk oppdatering";

        if (paused) {
          clearInterval(timer);
        } else {
          fetchStats();
          timer = setInterval(fetchStats, refreshInterval);
        }
      });

      fetchStats();
      timer = setInterval(fetchStats, refreshInterval);
    </script>
  </body>
</html>
